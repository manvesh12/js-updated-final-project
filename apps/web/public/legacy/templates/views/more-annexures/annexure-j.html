<div id="view-annexure-j" class="view">
  <div class="header-row">
    <div>
      <div class="page-title">Annexure J</div>
      <div class="page-sub">Upload and manage Annexure J PDFs and images</div>
    </div>
    <button type="button" class="btn btn-primary btn-sm" onclick="addAnnexureJ()">
      + Add Entry
    </button>
  </div>
  <div class="g2" style="grid-template-columns: 2fr 1fr;">
    <div>
      <div class="card">
        <div class="card-hd">
          <div class="card-title">Annexure J Entries</div>
        </div>
        <div class="card-bd">
          <div id="annexure-j-list"></div>
        </div>
      </div>
    </div>
    <div>
      <div class="card">
        <div class="card-hd">
          <div class="card-title">Upload Instructions</div>
        </div>
        <div class="card-bd">
          <p style="color: var(--text-soft); font-size: 14px; line-height: 1.6; margin: 0;">
            Upload PDF or image files for Annexure J. Each entry supports one file. Click <strong>"Add Entry"</strong> to create additional cards. Use <strong>Replace</strong> to change a file or <strong>Remove</strong> to detach it.
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
